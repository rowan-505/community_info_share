services:
  db:
    image: postgres:16-alpine
    container_name: community-info-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-community_info_news}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-community_info_news}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: community-info-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-community_info_news}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      RATE_LIMIT_LOGIN_MAX: ${RATE_LIMIT_LOGIN_MAX:-10}
      RATE_LIMIT_LOGIN_WINDOW_MS: ${RATE_LIMIT_LOGIN_WINDOW_MS:-60000}
      RATE_LIMIT_REGISTER_MAX: ${RATE_LIMIT_REGISTER_MAX:-5}
      RATE_LIMIT_REGISTER_WINDOW_MS: ${RATE_LIMIT_REGISTER_WINDOW_MS:-60000}
      RATE_LIMIT_CREATE_POST_MAX: ${RATE_LIMIT_CREATE_POST_MAX:-20}
      RATE_LIMIT_CREATE_POST_WINDOW_MS: ${RATE_LIMIT_CREATE_POST_WINDOW_MS:-60000}
      RATE_LIMIT_REACTIONS_MAX: ${RATE_LIMIT_REACTIONS_MAX:-30}
      RATE_LIMIT_REACTIONS_WINDOW_MS: ${RATE_LIMIT_REACTIONS_WINDOW_MS:-60000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

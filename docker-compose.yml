# Backend container against an existing CoreMap/Supabase PostgreSQL database.
# This project requires pre-existing app_auth tables; a fresh empty Postgres
# service is intentionally not included here.
#
# Setup:
#   cp .env.docker.example .env
#   # Edit DATABASE_URL (shared DB) and JWT_SECRET
#   docker compose up --build
#   docker compose exec backend npm run db:migrate:deploy
#   docker compose exec backend npm run db:seed
#
# Run the frontend separately (see README.md).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
        JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
        NODE_ENV: ${NODE_ENV:-development}
        DEMO_MODE: ${DEMO_MODE:-false}
    container_name: community-info-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DEMO_MODE: ${DEMO_MODE:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      RATE_LIMIT_LOGIN_MAX: ${RATE_LIMIT_LOGIN_MAX:-10}
      RATE_LIMIT_LOGIN_WINDOW_MS: ${RATE_LIMIT_LOGIN_WINDOW_MS:-60000}
      RATE_LIMIT_REGISTER_MAX: ${RATE_LIMIT_REGISTER_MAX:-5}
      RATE_LIMIT_REGISTER_WINDOW_MS: ${RATE_LIMIT_REGISTER_WINDOW_MS:-60000}
      RATE_LIMIT_CREATE_POST_MAX: ${RATE_LIMIT_CREATE_POST_MAX:-20}
      RATE_LIMIT_CREATE_POST_WINDOW_MS: ${RATE_LIMIT_CREATE_POST_WINDOW_MS:-60000}
      RATE_LIMIT_REACTIONS_MAX: ${RATE_LIMIT_REACTIONS_MAX:-30}
      RATE_LIMIT_REACTIONS_WINDOW_MS: ${RATE_LIMIT_REACTIONS_WINDOW_MS:-60000}
